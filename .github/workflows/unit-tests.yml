# Stable check name selected by Vercel's production deployment check.
# It proves the exact GitHub SHA both passes the product contracts and builds
# with the committed dependency lock before that SHA may be promoted.
name: Frontend release gate
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: frontend-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - name: Install exactly the committed dependency graph
        run: npm ci
      - name: Product and contract tests
        run: npm test -- --run __tests__
      - name: Production build
        run: npm run build
