# Unit + contract-gate tests as a real PR rail. Until now only Vercel's
# build gated FE PRs — vitest (incl. the display-name contract gate that
# blocks per-surface naming heuristics) ran only on dev machines.
name: unit-tests
on:
  pull_request:
  push:
    branches: [main]
jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      # --no-frozen: the repo's package.json overrides drifted from
      # pnpm-lock.yaml long ago (pre-existing) — frozen install dies
      # with ERR_PNPM_LOCKFILE_CONFIG_MISMATCH. Lockfile still guides
      # resolution; regenerating it is a separate cleanup.
      - run: pnpm install --no-frozen-lockfile
      - run: npx vitest run __tests__
